---
{{- if and .Values.heimdall.enabled .Values.heimdall.rules }}
apiVersion: heimdall.dadrus.github.com/v1alpha4
kind: RuleSet
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  rules:
    {{- toYaml .Values.heimdall.rules | nindent 4 }}
{{- end }}
