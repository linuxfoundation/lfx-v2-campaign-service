---
{{- if .Values.heimdall.enabled }}
apiVersion: heimdall.dadrus.github.com/v1alpha4
kind: RuleSet
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  rules:
    # OpenAPI specification documents are publicly readable (no authorization),
    # matching the reference-service pattern. A JWT is still minted so downstream
    # handlers receive a consistent identity context.
    - id: "rule:lfx:lfx-v2-campaign-service:openapi:get"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
          - HEAD
        routes:
          - path: /_campaigns/openapi.json
          - path: /_campaigns/openapi.yaml
          - path: /_campaigns/openapi3.json
          - path: /_campaigns/openapi3.yaml
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        - authorizer: allow_all
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    # Campaigns collection. The campaigns API is not yet implemented; these rules
    # keep the gateway-routed paths authenticated and deployable today.
    # TODO(LFXV2-2558): replace `allow_all` with per-endpoint `openfga_check`
    # authorizers (relation + object) once the campaigns API and its OpenFGA
    # object/relation model are defined. Requests still require a valid OIDC token
    # via the authenticators above.
    - id: "rule:lfx:lfx-v2-campaign-service:campaigns:collection"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
          - POST
        routes:
          - path: /campaigns
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        - authorizer: allow_all
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-campaign-service:campaigns:item"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
          - PUT
          - PATCH
          - DELETE
        routes:
          - path: /campaigns/:uid
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        - authorizer: allow_all
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}
{{- end }}
