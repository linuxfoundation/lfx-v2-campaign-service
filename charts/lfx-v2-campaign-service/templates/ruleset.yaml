---
{{- if .Values.heimdall.enabled }}
apiVersion: heimdall.dadrus.github.com/v1alpha4
kind: RuleSet
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  rules:
    # OpenAPI specification documents are publicly readable (no authorization),
    # matching the reference-service pattern. A JWT is still minted so downstream
    # handlers receive a consistent identity context.
    - id: "rule:lfx:lfx-v2-campaign-service:openapi:get"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
          - HEAD
        routes:
          - path: /_campaigns/openapi.json
          - path: /_campaigns/openapi.yaml
          - path: /_campaigns/openapi3.json
          - path: /_campaigns/openapi3.yaml
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        - authorizer: allow_all
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    # Campaigns collection/item. The campaigns API is not yet implemented; these
    # rules keep the gateway-routed paths deployable and fail-closed today: `oidc`
    # is the only authenticator (no `anonymous_authenticator` fallback), so a
    # request without a valid token is rejected rather than allowed through.
    # `allow_all` then permits any authenticated subject — it is NOT fine-grained
    # authorization.
    # TODO(LFXV2-2558): once the campaigns API and its OpenFGA object/relation
    # model are defined, add `anonymous_authenticator` back and replace `allow_all`
    # with per-endpoint `openfga_check` authorizers (relation + object), so the
    # anonymous subject is rejected by the FGA check (the reference-service pattern).
    - id: "rule:lfx:lfx-v2-campaign-service:campaigns:collection"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
          - POST
        routes:
          - path: /campaigns
      execute:
        - authenticator: oidc
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        - authorizer: allow_all
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-campaign-service:campaigns:item"
      allow_encoded_slashes: 'off'
      match:
        methods:
          - GET
          - PUT
          - PATCH
          - DELETE
        routes:
          - path: /campaigns/:uid
      execute:
        - authenticator: oidc
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        - authorizer: allow_all
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}
{{- end }}
