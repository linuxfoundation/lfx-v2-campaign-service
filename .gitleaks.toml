title = "gitleaks config"

[extend]
# useDefault will extend the base configuration with the default gitleaks config
useDefault = true

[allowlist]
    description = "Allowlisted files"
    paths = [
        # Exclude test files as they often contain dummy/fake data
        '''.*_test\.go$''',
        '''(go.mod|go.sum)$''',
        # Exclude documentation files with example tokens
        '''CLAUDE\.md$''',
        # Exclude Goa-generated code: gen/ is produced by `make apigen` and is
        # not hand-edited. The generated CLI flag usage strings (e.g. the
        # Twitter Ads connection test command's help text) false-positive the
        # twitter-api-secret rule; they are not real secrets.
        '''^gen/'''
    ]
