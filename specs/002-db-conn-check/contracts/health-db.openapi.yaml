# Hand-authored excerpt of the health contract after DB connectivity is included.
# HTTP status codes, bodies, and auth are unchanged from 001-health-endpoints.
# The authoritative spec is generated by `make apigen` into gen/http/openapi*.yaml.
openapi: 3.0.3
info:
  title: LFX V2 - Campaign Service (health + DB readiness excerpt)
  version: "1.0"
paths:
  /livez:
    get:
      summary: Check if the service is alive.
      description: >
        Liveness probe. Returns OK while the process can respond.
        Does not depend on database availability.
      operationId: livez
      security: []
      responses:
        "200":
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
              example: "OK\n"
  /readyz:
    get:
      summary: Check if the service is able to take inbound requests.
      description: >
        Readiness probe. Returns OK when the service is initialized and can
        reach its PostgreSQL database via a lightweight connectivity check.
        Returns 503 when not initialized or when the database check fails.
      operationId: readyz
      security: []
      responses:
        "200":
          description: Service is ready (including database connectivity).
          content:
            text/plain:
              schema:
                type: string
              example: "OK\n"
        "503":
          description: >
            Service is unavailable / not ready (startup incomplete or
            database connectivity check failed).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceUnavailableError"
components:
  schemas:
    ServiceUnavailableError:
      type: object
      properties:
        code:
          type: string
          example: "503"
        message:
          type: string
          example: "The service is unavailable."
      required:
        - code
        - message
