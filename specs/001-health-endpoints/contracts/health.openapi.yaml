# Hand-authored excerpt of the intended contract for review.
# The authoritative spec is generated by `make apigen` into gen/http/openapi*.yaml.
openapi: 3.0.3
info:
  title: LFX V2 - Campaign Service (health excerpt)
  version: "1.0"
paths:
  /livez:
    get:
      summary: Check if the service is alive.
      description: Liveness probe. Returns OK while the process can respond.
      operationId: livez
      security: []          # unauthenticated
      responses:
        "200":
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
              example: "OK\n"
  /readyz:
    get:
      summary: Check if the service is able to take inbound requests.
      description: Readiness probe. Returns OK when ready, 503 when not ready.
      operationId: readyz
      security: []          # unauthenticated
      responses:
        "200":
          description: Service is ready.
          content:
            text/plain:
              schema:
                type: string
              example: "OK\n"
        "503":
          description: Service is unavailable / not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceUnavailableError"
components:
  schemas:
    ServiceUnavailableError:
      type: object
      properties:
        code:
          type: string
          example: "503"
        message:
          type: string
          example: "The service is unavailable."
      required:
        - code
        - message
