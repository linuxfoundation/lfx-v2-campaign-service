# Grype configuration for the MegaLinter REPOSITORY_GRYPE scan.
#
# The ignored vulnerabilities below are all in github.com/docker/docker, a
# TRANSITIVE, TEST-ONLY dependency pulled in via golang-migrate's pgx driver
# tests (dhui/dktest). It is never imported by the service binary that ships
# to production. Four of the five have no fixed version available; the one
# that does (GHSA-x744-4wpc-v9h2, fixed in 29.3.1) is gated behind a
# dependency upgrade tracked separately. These are ignored (not suppressed
# globally) so any NEW vulnerability in a real runtime dependency still fails CI.
ignore:
  - vulnerability: GHSA-x744-4wpc-v9h2
    package:
      name: github.com/docker/docker
      type: go-module
  - vulnerability: GHSA-x86f-5xw2-fm2r
    package:
      name: github.com/docker/docker
      type: go-module
  - vulnerability: GHSA-rg2x-37c3-w2rh
    package:
      name: github.com/docker/docker
      type: go-module
  - vulnerability: GHSA-pxq6-2prw-chj9
    package:
      name: github.com/docker/docker
      type: go-module
  - vulnerability: GHSA-vp62-88p7-qqf5
    package:
      name: github.com/docker/docker
      type: go-module
